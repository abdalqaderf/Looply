<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Looply — Exam History</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Looply Real Design System Stylesheets -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard-student.css">
    <link rel="stylesheet" href="../../css/exam.css">
</head>

<body class="student-page">

    <!-- Managed by external JS components -->
    <header id="student-topbar-root"></header>
    <aside id="student-sidebar-root"></aside>
    <div id="student-sidebar-overlay" class="student-sidebar-overlay"></div>

    <main class="student-main">

        <!-- pt-5 and mt-5 to safely clear the fixed 72px topbar -->
        <div class="container-fluid px-5 pt-5 mt-5">

            <!-- 1. Page Header -->
            <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-5">
                <div>
                    <h1 class="t-ex-page-title m-0">Exam History</h1>
                    <p class="t-ex-page-subtitle m-0 mt-1">Review your completed exams and results.</p>
                </div>

                <!-- Search bar mapped to exam.css layout without inline styles -->
                <div class="t-ex-search-wrapper">
                    <i class="bi bi-search t-ex-search-icon top-50 translate-middle-y"></i>
                    <input type="search" class="t-ex-search-input" placeholder="Search history..."
                        aria-label="Search history">
                </div>
            </div>

            <!-- 2. Stat Cards -->
            <div class="row g-4 mb-5">

                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Total Exams</span>
                            <i class="bi bi-journal-text t-ex-stat-label"></i>
                        </div>
                        <h2 class="t-ex-stat-value" id="stat-total">00</h2>
                        <span class="t-ex-stat-sub">Submitted exams</span>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Passed</span>
                            <i class="bi bi-check-circle t-ex-stat-label text-success"></i>
                        </div>
                        <h2 class="t-ex-stat-value" id="stat-passed">00</h2>
                        <span class="t-ex-stat-sub">Successful attempts</span>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Pass Rate</span>
                            <i class="bi bi-bar-chart t-ex-stat-label text-primary"></i>
                        </div>
                        <h2 class="t-ex-stat-value" id="stat-passrate">00%</h2>
                        <span class="t-ex-stat-sub">Overall performance</span>
                    </div>
                </div>

            </div>

            <!-- 3. History Table Panel -->
            <div class="t-ex-panel p-4 p-md-5 mb-5">
                <div class="mb-4">
                    <h2 class="t-ex-panel-title m-0">Submission History</h2>
                    <span class="t-ex-panel-subtitle">All completed exams</span>
                </div>

                <div class="table-responsive">
                    <table class="t-ex-table">
                        <thead>
                            <tr>
                                <th>Exam Title</th>
                                <th>Submission Date</th>
                                <th>Score</th>
                                <th>Percentage</th>
                                <th>Result</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../../js/components/student-topbar.js"></script>
    <script src="../../js/components/student-sidebar.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const examHistory = [
                // Uncomment to test populated state:
                // { id: 1, title: "HTML5 & CSS3",  submissionDate: "Jul 10, 2026", score: 84, total: 100, result: "Pass" },
                // { id: 2, title: "Python Basics", submissionDate: "Jun 28, 2026", score: 55, total: 100, result: "Fail" },
            ];

            const passed = examHistory.filter(e => e.result === "Pass").length;
            const passRate = examHistory.length > 0 ? Math.round((passed / examHistory.length) * 100) : 0;

            // Update Top Stats
            document.getElementById("stat-total").textContent = String(examHistory.length).padStart(2, "0");
            document.getElementById("stat-passed").textContent = String(passed).padStart(2, "0");
            document.getElementById("stat-passrate").textContent = passRate + "%";

            const tbody = document.getElementById("history-tbody");

            if (examHistory.length === 0) {
                tbody.innerHTML = `
          <tr>
            <td colspan="6" class="text-center py-5">
              <div class="d-flex flex-column align-items-center opacity-75">
                <i class="bi bi-clock-history mb-2 display-6 text-secondary"></i>
                <p class="m-0 t-ex-name-sub">No exam history yet</p>
                <span class="t-ex-date mt-1">Your completed exams will appear here</span>
              </div>
            </td>
          </tr>`;
            } else {
                // Map directly onto the teacher's t-ex-table-row for the glow effect
                tbody.innerHTML = examHistory.map(exam => {
                    const pct = Math.round((exam.score / exam.total) * 100);

                    // Native Bootstrap badges mapped cleanly for pass/fail without inline CSS
                    const badgeHTML = exam.result === "Pass"
                        ? `<span class="badge rounded-pill text-bg-success px-3 py-2 border border-success-subtle bg-opacity-75">Pass</span>`
                        : `<span class="badge rounded-pill text-bg-danger px-3 py-2 border border-danger-subtle bg-opacity-75">Fail</span>`;

                    return `
            <tr class="t-ex-table-row">
              <td>
                <div class="t-ex-title-cell">
                  <span class="t-ex-name-main">${exam.title}</span>
                </div>
              </td>
              <td><span class="t-ex-date">${exam.submissionDate}</span></td>
              <td><span class="t-ex-numeric">${exam.score} / ${exam.total}</span></td>
              <td><span class="t-ex-numeric">${pct}%</span></td>
              <td>${badgeHTML}</td>
              <td>
                <div class="t-ex-actions">
                  <a href="#" class="primary-btn text-decoration-none">View</a>
                </div>
              </td>
            </tr>`;
                }).join("");
            }
        });
    </script>

</body>

</html>
