<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Looply — Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard-student.css">
    <link rel="stylesheet" href="../../css/exam.css">
</head>

<body class="student-page">

    <header id="student-topbar-root"></header>
    <aside id="student-sidebar-root"></aside>
    <div id="student-sidebar-overlay" class="student-sidebar-overlay"></div>

    <main class="student-main">

        <!-- pt-5 and mt-5 to safely clear the fixed 72px topbar -->
        <div class="container-fluid px-5 pt-5 mt-5">

            <!-- Page Header using exact Teacher classes -->
            <div class="mb-5">
                <h1 class="t-ex-page-title m-0">Profile</h1>
                <p class="t-ex-page-subtitle m-0 mt-1">Account and role information.</p>
            </div>

            <div class="row">
                <div class="col-12 col-md-10 col-lg-8 col-xl-6">

                    <!-- t-ex-panel handles the premium box styling -->
                    <div class="t-ex-panel p-4 p-md-5 d-flex flex-column align-items-start">

                        <!-- Avatar: Leveraging .primary-btn to steal the orange gradient -->
                        <div class="primary-btn rounded-4 p-4 mb-4 d-inline-flex align-items-center justify-content-center"
                            style="pointer-events: none;">
                            <i class="bi bi-person-fill display-5 m-0 text-white"></i>
                        </div>

                        <!-- Profile Info: Reusing existing stat-value for Karantina typography -->
                        <h2 class="t-ex-stat-value mb-1" id="profile-name">Lina Doe</h2>
                        <div class="t-ex-name-sub fs-6 mb-4 pb-2" id="profile-username">@linastudent</div>

                        <!-- Profile Badges using native Bootstrap utilities matching the dark aesthetic -->
                        <div class="d-flex flex-wrap gap-3">

                            <div
                                class="badge rounded-pill text-bg-dark border border-secondary-subtle px-4 py-2 d-flex align-items-center gap-2 bg-opacity-50">
                                <i class="bi bi-person text-primary fs-6"></i>
                                <span class="fw-normal text-light fs-6 opacity-75" id="profile-firstname">Lina</span>
                            </div>

                            <div
                                class="badge rounded-pill text-bg-dark border border-secondary-subtle px-4 py-2 d-flex align-items-center gap-2 bg-opacity-50">
                                <i class="bi bi-shield text-primary fs-6"></i>
                                <span class="fw-normal text-light fs-6 opacity-75" id="profile-role">Student</span>
                            </div>

                            <div
                                class="badge rounded-pill text-bg-dark border border-secondary-subtle px-4 py-2 d-flex align-items-center gap-2 bg-opacity-50">
                                <i class="bi bi-calendar3 text-primary fs-6"></i>
                                <span class="fw-normal text-light fs-6 opacity-75" id="profile-since">Member since
                                    January 2025</span>
                            </div>

                        </div>

                    </div>

                </div>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../../js/components/student-topbar.js"></script>
    <script src="../../js/components/student-sidebar.js"></script>

    <script>
        const user = {
            fullName: "Lina Doe",
            username: "@linastudent",
            firstName: "Lina",
            role: "Student",
            memberSince: "January 2025",
        };

        document.getElementById("profile-name").textContent = user.fullName;
        document.getElementById("profile-username").textContent = user.username;
        document.getElementById("profile-firstname").textContent = user.firstName;
        document.getElementById("profile-role").textContent = user.role;
        document.getElementById("profile-since").textContent = "Member since " + user.memberSince;
    </script>

</body>

</html>
