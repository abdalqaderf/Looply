<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looply — Student Dashboard</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Looply Design System Stylesheets -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/dashboard-student.css">
    <link rel="stylesheet" href="../../css/exam.css">
</head>

<body class="student-page">

    <!-- Managed by external JS components -->
    <header id="student-topbar-root"></header>
    <aside id="student-sidebar-root"></aside>
    <div id="student-sidebar-overlay" class="student-sidebar-overlay"></div>

    <main class="student-main">
        <!-- Added pt-5 and mt-5 (padding-top & margin-top) to clear the topbar without inline CSS -->
        <div class="container-fluid px-5 pt-5 mt-5">

            <!-- 1. Page Header -->
            <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-5">
                <div>
                    <h1 class="t-ex-page-title m-0">Welcome back, Lina</h1>
                    <p class="t-ex-page-subtitle m-0 mt-1">Here's what's happening with your exams today.</p>
                </div>
                <div class="d-flex align-items-center gap-4 header-actions-wrap">
                    <a href="/history.html"
                        class="link-light link-underline-opacity-0 link-opacity-75 link-opacity-100-hover fw-medium">Go
                        to History</a>
                    <a href="/exams.html" class="t-ex-btn-primary text-decoration-none">
                        <i class="bi bi-list-ul"></i> Go to Exams
                    </a>
                </div>
            </div>

            <!-- 2. Stat Cards Grid -->
            <div class="row g-4 mb-5">
                <!-- Card 1 -->
                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Available Exams</span>
                            <i class="bi bi-file-earmark-text t-ex-stat-label"></i>
                        </div>
                        <h2 class="t-ex-stat-value">02</h2>
                        <span class="t-ex-stat-sub">4 new this month</span>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Completed Exams</span>
                            <i class="bi bi-check-circle t-ex-stat-label"></i>
                        </div>
                        <h2 class="t-ex-stat-value">08</h2>
                        <span class="t-ex-stat-sub">4 new this month</span>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="col-12 col-md-4">
                    <div class="t-ex-stat-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="t-ex-stat-label">Total Points</span>
                            <i class="bi bi-star t-ex-stat-label"></i>
                        </div>
                        <h2 class="t-ex-stat-value">48</h2>
                        <span class="t-ex-stat-sub">4 new this month</span>
                    </div>
                </div>
            </div>

            <!-- 3. Bottom Row Panels -->
            <div class="row g-4">

                <!-- Available Now Panel -->
                <div class="col-12 col-lg-7">
                    <div class="t-ex-panel h-100 p-4 p-md-5 d-flex flex-column">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="t-ex-panel-title m-0">Available Now</h2>
                            <a href="/exams.html"
                                class="d-flex align-items-center gap-1 text-decoration-none t-ex-name-sub">
                                View All <i class="bi bi-chevron-right"></i>
                            </a>
                        </div>

                        <div id="available-exams-list" class="d-flex flex-column gap-3">
                            <!-- Populated via JS -->
                        </div>

                    </div>
                </div>

                <!-- Recent Exams Panel -->
                <div class="col-12 col-lg-5">
                    <div class="t-ex-panel h-100 p-4 p-md-5 d-flex flex-column gap-4">

                        <div class="d-flex justify-content-between align-items-center">
                            <h2 class="t-ex-panel-title m-0">Recent Exams</h2>
                            <span class="t-ex-name-sub" role="button">Details</span>
                        </div>

                        <!-- Repainted Score Ring (Purple/Violet instead of Orange) -->
                        <div class="d-flex flex-column align-items-center gap-2 py-2">
                            <svg width="140" height="140" viewBox="0 0 120 120" aria-label="Score: 84%">
                                <defs>
                                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#b287ff" />
                                        <stop offset="100%" stop-color="#7c5dfa" />
                                    </linearGradient>
                                    <!-- Subtle glow filter -->
                                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feGaussianBlur stdDeviation="3" result="blur" />
                                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                    </filter>
                                </defs>

                                <!-- Background Track -->
                                <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(178,135,255,0.1)"
                                    stroke-width="8" transform="rotate(-90 60 60)" />

                                <!-- Progress Foreground (84%) -->
                                <circle cx="60" cy="60" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="8"
                                    stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="50.27"
                                    transform="rotate(-90 60 60)" filter="url(#glow)" />

                                <!-- Center Text -->
                                <text x="60" y="64" fill="var(--text)" font-family="var(--font-title)"
                                    font-size="2.2rem" font-weight="700" text-anchor="middle"
                                    dominant-baseline="middle">84%</text>
                            </svg>
                            <span class="fw-semibold text-white fs-6 mt-2">HTML5 &amp; CSS3</span>
                        </div>

                        <div class="d-flex flex-column gap-3 mt-auto">
                            <!-- Standard Bootstrap progress mapping for semantic HTML -->
                            <div class="progress bg-dark" role="progressbar" aria-valuenow="84" aria-valuemin="0"
                                aria-valuemax="100">
                                <div class="progress-bar bg-primary" style="width: 84%;"></div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center pt-2">
                                <span class="t-ex-name-sub">Score</span>
                                <span class="fw-semibold text-white fs-6">84 / 100</span>
                            </div>

                            <button class="t-ex-btn-primary w-100 mt-2 justify-content-center">Review Answers</button>
                        </div>

                    </div>
                </div>

            </div><!-- /row -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const availableExams = [
                {id: 1, title: "JavaScript Fundamentals", questions: 15, endsDate: "Jul 18th, 2026"},
                {id: 2, title: "React Components & Hooks", questions: 25, endsDate: "Jul 22nd, 2026"}
            ];

            const list = document.getElementById("available-exams-list");

            if (availableExams.length === 0) {
                list.innerHTML = `
                    <div class="t-ex-list-row d-flex flex-column align-items-center justify-content-center py-5 opacity-75">
                        <i class="bi bi-journal-x mb-2 display-6 text-secondary"></i>
                        <p class="m-0 t-ex-name-sub">No exams available right now</p>
                    </div>`;
            } else {
                // Rendering items using the teacher's glowing table row logic
                list.innerHTML = availableExams.map(exam => `
                    <div class="t-ex-list-row d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3">
                        <div class="t-ex-title-cell">
                            <span class="t-ex-name-main">${exam.title}</span>
                            <span class="t-ex-name-sub"><i class="bi bi-list-ol"></i> ${exam.questions} questions &nbsp;&middot;&nbsp; <i class="bi bi-calendar-event"></i> Ends ${exam.endsDate}</span>
                        </div>
                        <a href="/exams.html" class="t-ex-btn-primary">
                            Start Exam
                        </a>
                    </div>
                `).join("");
            }
        });
    </script>

    <!-- Component Scripts -->
    <script src="../../js/components/student-topbar.js"></script>
    <script src="../../js/components/student-sidebar.js"></script>

</body>

</html>
